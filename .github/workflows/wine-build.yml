name: Wine Fork Build

on:
  push:
    paths:
      - 'patches/cauldron/**'
      - 'scripts/init_wine_fork.sh'
      - 'scripts/build_wine.sh'
      - '.github/workflows/wine-build.yml'
  pull_request:
    paths:
      - 'patches/cauldron/**'
  workflow_dispatch:
  schedule:
    # Weekly Sunday 4 AM UTC — rebuild against latest upstream
    - cron: '0 4 * * 0'

jobs:
  build-wine:
    name: Build Cauldron Wine (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Wine build dependencies
        run: |
          brew install bison flex mingw-w64 gettext pkg-config gnutls freetype
          echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/flex/bin" >> $GITHUB_PATH

      - name: Cache Wine source
        uses: actions/cache@v4
        with:
          path: wine/.git
          key: wine-source-${{ hashFiles('scripts/init_wine_fork.sh') }}
          restore-keys: wine-source-

      - name: Initialize Wine fork
        run: make wine-init

      - name: Verify patches applied
        run: |
          cd wine
          echo "=== Commits on cauldron/main ==="
          git log --oneline wine-10.0..cauldron/main || git log --oneline -10
          echo ""
          echo "=== Checking VirtualProtect fix ==="
          git log --oneline --grep="Preserve private" | head -1

      - name: Build Wine
        run: make wine-build
        env:
          JOBS: 4

      - name: Verify build
        run: |
          test -x build/wine-dist/bin/wine64
          echo "Wine binary built successfully"
          ls -la build/wine-dist/bin/

      - name: Upload Wine binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: cauldron-wine-macos-arm64
          path: build/wine-dist/
          retention-days: 30

  patch-check:
    name: Verify Patches Apply
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone upstream Wine
        run: |
          git clone --branch wine-10.0 --single-branch --depth=1 \
            https://github.com/wine-mirror/wine.git wine-test

      - name: Dry-run all patches
        run: |
          cd wine-test
          FAIL=0
          for patch in ../patches/cauldron/*.patch; do
            NAME=$(basename "$patch")
            if git apply --check "$patch" 2>/dev/null; then
              echo "PASS: $NAME"
            elif git apply --check -C1 "$patch" 2>/dev/null; then
              echo "WARN: $NAME (fuzzy match)"
            else
              echo "FAIL: $NAME"
              git apply --check "$patch" 2>&1 | head -5
              FAIL=1
            fi
          done
          exit $FAIL
