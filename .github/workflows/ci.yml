name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-rust:
    name: Rust Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  build-check:
    name: Build Check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo fmt check
        run: cargo fmt --check

      - name: Build Swift app
        run: |
          cargo build --release -p cauldron-bridge
          cd CauldronApp && swift build

  e2e-cli:
    name: CLI E2E Tests
    runs-on: macos-14
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p cauldron-cli

      - name: Run E2E tests
        run: python3 scripts/test_e2e.py --binary target/release/cauldron
